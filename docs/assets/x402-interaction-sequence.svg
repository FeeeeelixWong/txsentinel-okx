<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1500" viewBox="0 0 1440 1500" role="img" aria-labelledby="title desc">
  <title id="title">TxSentinel preflight, paid decision, settlement, and evidence interaction</title>
  <desc id="desc">Static sequence diagram showing seller setup, free buyer preflight, policy evaluation before payment, OKX Wallet authorization, facilitator settlement on X Layer, formal policy response, and optional receipt anchoring.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a8b2bb"/>
    </marker>
    <style>
      .actor { fill: #171d23; stroke: #4a555f; stroke-width: 2; }
      .actorTitle { fill: #f0f3f5; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .actorSub { fill: #8b949e; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .phase { fill: #8b949e; font: 700 15px ui-monospace, SFMono-Regular, Menlo, monospace; }
      .step { fill: #f0f3f5; font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .detail { fill: #8b949e; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .number { fill: #0d1117; font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace; text-anchor: middle; dominant-baseline: central; }
      .life { stroke: #56616b; stroke-width: 2; stroke-dasharray: 7 7; }
      .flow { fill: none; stroke: #a8b2bb; stroke-width: 2; marker-end: url(#arrow); }
      .return { fill: none; stroke: #55d6d2; stroke-width: 2; marker-end: url(#arrow); }
      .chain { fill: none; stroke: #cbf43e; stroke-width: 2; marker-end: url(#arrow); }
      .divider { stroke: #39434c; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1440" height="1500" rx="8" fill="#0d1117"/>

  <rect x="25" y="24" width="180" height="70" rx="7" class="actor"/>
  <text x="115" y="53" class="actorTitle">Seller</text>
  <text x="115" y="76" class="actorSub">Service operator</text>
  <rect x="260" y="24" width="180" height="70" rx="7" class="actor"/>
  <text x="350" y="53" class="actorTitle">Buyer / Agent</text>
  <text x="350" y="76" class="actorSub">Policy API caller</text>
  <rect x="490" y="24" width="180" height="70" rx="7" class="actor"/>
  <text x="580" y="53" class="actorTitle">OKX Wallet</text>
  <text x="580" y="76" class="actorSub">Buyer signing boundary</text>
  <rect x="730" y="24" width="180" height="70" rx="7" class="actor"/>
  <text x="820" y="53" class="actorTitle">TxSentinel</text>
  <text x="820" y="76" class="actorSub">Preflight + formal API</text>
  <rect x="970" y="24" width="180" height="70" rx="7" class="actor"/>
  <text x="1060" y="53" class="actorTitle">OKX Facilitator</text>
  <text x="1060" y="76" class="actorSub">Verify and settle</text>
  <rect x="1210" y="24" width="180" height="70" rx="7" class="actor"/>
  <text x="1300" y="53" class="actorTitle">X Layer</text>
  <text x="1300" y="76" class="actorSub">Settlement + evidence</text>

  <line x1="115" y1="94" x2="115" y2="1480" class="life"/>
  <line x1="350" y1="94" x2="350" y2="1480" class="life"/>
  <line x1="580" y1="94" x2="580" y2="1480" class="life"/>
  <line x1="820" y1="94" x2="820" y2="1480" class="life"/>
  <line x1="1060" y1="94" x2="1060" y2="1480" class="life"/>
  <line x1="1300" y1="94" x2="1300" y2="1480" class="life"/>

  <text x="28" y="128" class="phase">A. SELLER SETUP</text>
  <circle cx="28" cy="166" r="13" fill="#cbf43e"/><text x="28" y="166" class="number">1</text>
  <path d="M115 166 H820" class="flow"/>
  <text x="468" y="151" class="step">Configure service price, payTo, and accepted assets</text>
  <text x="468" y="181" class="detail">Server-side settings; never supplied by the buyer</text>

  <circle cx="28" cy="226" r="13" fill="#55d6d2"/><text x="28" y="226" class="number">2</text>
  <path d="M820 226 H115" class="return"/>
  <text x="468" y="211" class="step">Preflight and formal endpoints are ready</text>
  <text x="468" y="241" class="detail">POST /api/preflight + POST /api/check-paid</text>

  <line x1="25" y1="272" x2="1390" y2="272" class="divider"/>
  <text x="28" y="307" class="phase">B. FREE READINESS PREFLIGHT</text>

  <circle cx="28" cy="350" r="13" fill="#e8b44b"/><text x="28" y="350" class="number">3</text>
  <path d="M350 350 H820" class="flow"/>
  <text x="585" y="335" class="step">Submit proposed action + policy + evidence</text>
  <text x="585" y="365" class="detail">No wallet or payment is involved</text>

  <circle cx="28" cy="420" r="13" fill="#55d6d2"/><text x="28" y="420" class="number">4</text>
  <path d="M820 420 H350" class="return"/>
  <text x="585" y="405" class="step">READY / REVIEW / BLOCKED</text>
  <text x="585" y="435" class="detail">Basic, non-binding screen; READY does not mean ALLOW</text>

  <line x1="25" y1="466" x2="1390" y2="466" class="divider"/>
  <text x="28" y="501" class="phase">C. FORMAL PAID POLICY CHECK</text>

  <circle cx="28" cy="550" r="13" fill="#e8b44b"/><text x="28" y="550" class="number">5</text>
  <path d="M350 550 H820" class="flow"/>
  <text x="585" y="535" class="step">Request formal decision</text>
  <text x="585" y="565" class="detail">POST /api/check-paid with the full proposal</text>

  <circle cx="28" cy="620" r="13" fill="#e8b44b"/><text x="28" y="620" class="number">6</text>
  <path d="M820 605 H915 V640 H828" class="flow"/>
  <text x="1050" y="605" class="step">Validate and precompute offchain</text>
  <text x="1050" y="635" class="detail">Invalid schema returns 422; nothing is paid or written onchain</text>

  <circle cx="28" cy="700" r="13" fill="#55d6d2"/><text x="28" y="700" class="number">7</text>
  <path d="M820 700 H350" class="return"/>
  <text x="585" y="685" class="step">HTTP 402 + PAYMENT-REQUIRED</text>
  <text x="585" y="715" class="detail">Only valid requests reach the seller quote</text>

  <circle cx="28" cy="770" r="13" fill="#e8b44b"/><text x="28" y="770" class="number">8</text>
  <path d="M350 770 H580" class="flow"/>
  <text x="465" y="755" class="step">Review quote and choose asset</text>
  <text x="465" y="785" class="detail">Approve or reject the exact seller terms</text>

  <circle cx="28" cy="840" r="13" fill="#e8b44b"/><text x="28" y="840" class="number">9</text>
  <path d="M580 840 H350" class="return"/>
  <text x="465" y="825" class="step">PAYMENT-SIGNATURE</text>
  <text x="465" y="855" class="detail">EIP-3009 authorization; private key stays in wallet</text>

  <circle cx="28" cy="910" r="13" fill="#e8b44b"/><text x="28" y="910" class="number">10</text>
  <path d="M350 910 H820" class="flow"/>
  <text x="585" y="895" class="step">Retry with payment proof</text>
  <text x="585" y="925" class="detail">Validation and deterministic evaluation run again</text>

  <circle cx="28" cy="980" r="13" fill="#55d6d2"/><text x="28" y="980" class="number">11</text>
  <path d="M820 980 H1060" class="flow"/>
  <text x="940" y="965" class="step">Verify and settle</text>
  <text x="940" y="995" class="detail">Official facilitator API</text>

  <circle cx="28" cy="1050" r="13" fill="#cbf43e"/><text x="28" y="1050" class="number">12</text>
  <path d="M1060 1050 H1300" class="chain"/>
  <text x="1180" y="1035" class="step">EIP-3009 settlement</text>
  <text x="1180" y="1065" class="detail">Authorized service-payment transfer</text>

  <circle cx="28" cy="1120" r="13" fill="#cbf43e"/><text x="28" y="1120" class="number">13</text>
  <path d="M1300 1120 H115" class="chain"/>
  <text x="708" y="1105" class="step">Credit the seller's payTo address</text>
  <text x="708" y="1135" class="detail">This is the API fee, not the protected action</text>

  <circle cx="28" cy="1190" r="13" fill="#55d6d2"/><text x="28" y="1190" class="number">14</text>
  <path d="M1060 1190 H820" class="return"/>
  <text x="940" y="1175" class="step">Settlement receipt + transaction hash</text>
  <text x="940" y="1205" class="detail">PAYMENT-RESPONSE</text>

  <circle cx="28" cy="1260" r="13" fill="#55d6d2"/><text x="28" y="1260" class="number">15</text>
  <path d="M820 1260 H350" class="return"/>
  <text x="585" y="1245" class="step">ALLOW / HOLD / DENY + detailed evidence</text>
  <text x="585" y="1275" class="detail">Risk score, actionDigest, receiptHash, and deterministic receipt</text>

  <line x1="25" y1="1306" x2="1390" y2="1306" class="divider"/>
  <text x="28" y="1341" class="phase">D. OPTIONAL EVIDENCE ANCHOR</text>

  <circle cx="28" cy="1380" r="13" fill="#e8b44b"/><text x="28" y="1380" class="number">16</text>
  <path d="M350 1380 H580" class="flow"/>
  <text x="465" y="1365" class="step">Approve anchorReceipt</text>
  <text x="465" y="1395" class="detail">Separate wallet transaction using the paid receipt</text>

  <circle cx="28" cy="1450" r="13" fill="#cbf43e"/><text x="28" y="1450" class="number">17</text>
  <path d="M580 1450 H1300" class="chain"/>
  <text x="940" y="1435" class="step">Store receipt hash on X Layer</text>
  <text x="940" y="1465" class="detail">Evidence only; does not execute the protected action</text>
</svg>
